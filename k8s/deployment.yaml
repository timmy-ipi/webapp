apiVersion: apps/v1
kind: Deployment

metadata:
  name: webapp
  labels:
    app: webapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: webapp

  template:
    metadata:
      labels:
        app: webapp

    spec:
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: webapp
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
