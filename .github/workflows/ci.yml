name: DevSecOps Pipeline (Cloud)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    
permissions:
  contents: read
  security-events: write
  packages: write
  
jobs:
  # 1. Tests unitaires + couverture
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: npm test

      - name: Sauvegarder la couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # 2. SonarQube Cloud — SAST & qualité du code
  sonar-check:
    needs: unit-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Récupérer la couverture
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Analyse SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Attend le verdict de la Quality Gate par défaut "Sonar way"
          # et fait échouer le job si elle n'est pas respectée.
          args: >
            -Dsonar.qualitygate.wait=false

  # 3. Trivy — scan des dépendances (SCA)
  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer les dépendances
        run: npm install

      - name: Scan Trivy au format SARIF
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"

      - name: Publier les résultats Trivy dans GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

      - name: Bloquer si vulnérabilité HIGH/CRITICAL
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"

  # 4. Build de l'image Docker
  build-image:
    needs: [sonar-check, dependency-scan]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Exporter l'image
        run: docker save my-app:${{ github.sha }} -o my-image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: my-image.tar

  # 5. Trivy — scan de l'image conteneur
  container-scan:
    needs: build-image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: Charger l'image
        run: docker load -i my-image.tar

      - name: Scan de l'image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "my-app:${{ github.sha }}"
          severity: "CRITICAL"
          exit-code: "1"

#6. GitLeaks : Recherche des secrets exposés dans le code / historique de GIT
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 #Récupère tout l'historique de Git

      - name: Scan des secrets avec Gitleaks
        uses: gitleaks/gitleaks-action@v2 #Lance Gitleaks 

#7. Publication de l'image Docker dans GHCR : 
  publish-image:
    needs: [unit-test, sonar-check, dependency-scan]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Connexion GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push image
        run: |
          docker build -t ghcr.io/timmy-ipi/webapp:latest .
          docker push ghcr.io/timmy-ipi/webapp:latest


       build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Nom de l'image en minuscules
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/webapp" >> "$GITHUB_ENV"

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

    # 2. Déployer l'image sur un cluster Kubernetes éphémère (kind)
    deploy-k8s:
      needs: build-and-push
      runs-on: ubuntu-latest
  
      steps:
        - uses: actions/checkout@v4
  
        - name: Nom de l'image en minuscules
          run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/webapp" >> "$GITHUB_ENV"
  
        - name: Créer un cluster Kubernetes éphémère (kind)
          uses: helm/kind-action@v1
          with:
            cluster_name: tp3
  
        - name: Créer le secret pour tirer l'image privée depuis GHCR
          run: |
            kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }}
  
        - name: Installer ingress-nginx
          run: |
            kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
            kubectl wait --namespace ingress-nginx \
              --for=condition=ready pod \
              --selector=app.kubernetes.io/component=controller \
              --timeout=120s
                 sleep 20
  
        - name: Injecter l'image puis déployer les manifests
          run: |
            sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}:${GITHUB_SHA}|g" k8s/deployment.yaml
            kubectl apply -f k8s/
            kubectl rollout status deployment/webapp --timeout=120s
  
        - name: Vérifier le déploiement avec un smoke test
          run: |
            kubectl get pods -o wide
            kubectl get svc webapp
            kubectl port-forward svc/webapp 8080:80 &
            sleep 5
            curl -s http://localhost:8080/ | grep -i "hello"
            
        - name: Tester via Ingress
          run: |
            kubectl get ingress
            kubectl get svc -n ingress-nginx
            kubectl port-forward -n ingress-nginx svc/ingress-nginx-controller 8081:80 &
            sleep 10
            curl -H "Host: webapp.local" http://localhost:8081/ | grep -i "hello"
                  
        - name: Vérifier le HPA
          run: |
            kubectl get hpa
            kubectl describe hpa webapp-hpa
