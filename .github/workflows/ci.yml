name: DevSecOps Pipeline (Cloud)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  # 1. Tests unitaires + couverture
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: npm test

      - name: Sauvegarder la couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # 2. SonarQube Cloud — SAST & qualité du code
  sonar-check:
    needs: unit-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Récupérer la couverture
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Analyse SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Attend le verdict de la Quality Gate par défaut "Sonar way"
          # et fait échouer le job si elle n'est pas respectée.
          args: >
            -Dsonar.qualitygate.wait=true

  # 3. Trivy — scan des dépendances (SCA)
  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan Trivy au format SARIF
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"

      - name: Publier les résultats Trivy dans GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

      - name: Bloquer si vulnérabilité HIGH/CRITICAL
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"

  # 4. Build de l'image Docker
  build-image:
    needs: [sonar-check, dependency-scan]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Exporter l'image
        run: docker save my-app:${{ github.sha }} -o my-image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: my-image.tar

  # 5. Trivy — scan de l'image conteneur
  container-scan:
    needs: build-image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: Charger l'image
        run: docker load -i my-image.tar

      - name: Scan de l'image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "my-app:${{ github.sha }}"
          severity: "CRITICAL"
          exit-code: "1"

#6. GitLeaks : Recherche des secrets exposés dans le code / historique de GIT
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 #Récupère tout l'historique de Git

      - name: Scan des secrets avec Gitleaks
        uses: gitleaks/gitleaks-action@v2 #Lance Gitleaks 
